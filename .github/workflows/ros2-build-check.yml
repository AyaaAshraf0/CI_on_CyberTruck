      #   run: |
      #     docker run --rm \
      #       cyber_truck:ci-${{ github.sha }} \
      #       bash -c "source /opt/ros/humble/setup.bash && \
      #                cd /app/cyber_truck && \
      #                source install/setup.bash && \
      #                colcon test --event-handlers console_cohesion+ && \
      #                colcon test-result --verbose"